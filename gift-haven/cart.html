<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Gift Haven</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🎁 Gift Haven</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="products.html" class="nav-link">Products</a></li>
                <li><a href="cart.html" class="nav-link active">Cart</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <h1>Shopping Cart</h1>

        <!-- Cart Items -->
        <section class="cart-section">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-items">
                    <!-- Cart items will be displayed here -->
                    <tr>
                        <td colspan="5" class="empty-cart">Your cart is empty. <a href="products.html">Continue
                                shopping</a></td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- Cart Summary -->
        <section class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping:</span>
                <span id="shipping">$0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax:</span>
                <span id="tax">$0.00</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="total">$0.00</span>
            </div>
            <button class="btn btn-primary btn-checkout">Proceed to Checkout</button>
            <a href="products.html" class="btn btn-secondary">Continue Shopping</a>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Gift Haven. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
